{% load djicons i18n %}
<div data-back-url="{% url 'esign:signature_requests_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Signaturerequest" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'esign:signature_requests_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-signature_request-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-signature_request-form"
          hx-post="{% url 'esign:signature_request_edit' obj.id %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Title" %}</label>
                <input type="text" name="title" class="input input-sm w-full" value="{{ obj.title }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Document Name" %}</label>
                <input type="text" name="document_name" class="input input-sm w-full" value="{{ obj.document_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Signer Name" %}</label>
                <input type="text" name="signer_name" class="input input-sm w-full" value="{{ obj.signer_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Signer Email" %}</label>
                <input type="email" name="signer_email" class="input input-sm w-full" value="{{ obj.signer_email }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Sent At" %}</label>
                <input type="datetime-local" name="sent_at" class="input input-sm w-full" value="{{ obj.sent_at }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Signed At" %}</label>
                <input type="datetime-local" name="signed_at" class="input input-sm w-full" value="{{ obj.signed_at }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Expires At" %}</label>
                <input type="date" name="expires_at" class="input input-sm w-full" value="{{ obj.expires_at }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
                <textarea name="notes" class="textarea textarea-sm w-full" rows="3">{{ obj.notes }}</textarea>
                </div>
            </div>
        </div>
    </form>
</div>
